<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">IBM Professional Full Stack Software Developer Certificate</title>
  <desc id="desc">Preview-style certificate graphic for portfolio display.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)" />
  <rect x="40" y="40" width="1120" height="720" rx="20" fill="#0b1220" stroke="#93c5fd" stroke-width="4" />
  <text x="600" y="220" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="42">Certificate</text>
  <text x="600" y="320" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="56" font-weight="700">IBM Professional</text>
  <text x="600" y="395" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="56" font-weight="700">Full Stack Developer</text>
  <text x="600" y="510" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="30">Kyaw Sitt Thawe</text>
  <text x="600" y="600" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="24">Coursera Verification</text>
</svg>
