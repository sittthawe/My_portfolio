<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Modern Art and Ideas Certificate</title>
  <desc id="desc">Preview-style certificate graphic for portfolio display.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#431407" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)" />
  <rect x="40" y="40" width="1120" height="720" rx="20" fill="#35170f" stroke="#fdba74" stroke-width="4" />
  <text x="600" y="220" text-anchor="middle" fill="#fed7aa" font-family="Arial, sans-serif" font-size="42">Certificate</text>
  <text x="600" y="320" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="62" font-weight="700">Modern Art</text>
  <text x="600" y="395" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="62" font-weight="700">&amp; Ideas</text>
  <text x="600" y="510" text-anchor="middle" fill="#fed7aa" font-family="Arial, sans-serif" font-size="30">Kyaw Sitt Thawe</text>
  <text x="600" y="600" text-anchor="middle" fill="#fdba74" font-family="Arial, sans-serif" font-size="24">Coursera Verification</text>
</svg>
